<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScienceHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* Topbar */
.topbar{
height:60px;
background:#111;
color:white;
display:flex;
align-items:center;
padding-left:70px;
font-size:22px;
}

/* 3 Dot Menu */
.menu-btn{
position:absolute;
left:20px;
top:15px;
cursor:pointer;
}

.dot{
width:12px;
height:12px;
background:white;
border-radius:50%;
margin:5px 0;
}

/* Sidebar */
.sidebar{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#111;
transition:0.3s;
padding-top:70px;
}

.sidebar a{
display:block;
color:white;
padding:15px 20px;
text-decoration:none;
border-bottom:1px solid #333;
}

.sidebar.active{
left:0;
}

/* Main Content */
.content{
padding:100px 20px;
text-align:center;
}

</style>

</head>

<body>

<!-- Topbar -->
<div class="topbar">
ScienceHub
</div>

<!-- Menu Button -->
<div class="menu-btn" onclick="openMenu()">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<a href="#">Home</a>
<a href="#">Notes</a>
<a href="#">MCQs</a>
<a href="#">Contact</a>
</div>

<!-- Main Content -->
<div class="content">
<h1>Welcome to ScienceHub</h1>
<p>Free Notes, MCQs and PDFs</p>
</div>

<script>

function openMenu(){
document.getElementById("sidebar")
.classList.toggle("active");
}

</script>

</body>
</html>
